{{/* Header partial for Homepage — fixed transparent nav */}}
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between bg-[#0A0A0A]/80 px-6 md:px-10 py-4 transition-all duration-300 border-b border-primary/10 backdrop-blur-sm">
  <a href="{{ "/" | relURL }}" class="flex items-center gap-4 text-primary no-underline">
    <div class="size-6">
      {{ partial "logo.html" . }}
    </div>
    <h2 class="font-heading text-primary text-2xl font-bold uppercase tracking-widest leading-none">PEAK</h2>
  </a>
  <div class="hidden md:flex flex-1 justify-end gap-8">
    <nav class="flex items-center gap-6 lg:gap-9">
      {{ $currentPage := . }}
      <a class="text-[#F5F5F5] hover:text-primary text-[11px] font-bold uppercase tracking-[0.2em] transition-colors{{ if eq $currentPage.RelPermalink "/" }} text-primary border-b border-primary pb-1{{ end }}" href="{{ "/" | relURL }}">HOME</a>
      <a class="text-[#F5F5F5] hover:text-primary text-[11px] font-bold uppercase tracking-[0.2em] transition-colors{{ if eq $currentPage.RelPermalink "/schedule/" }} text-primary border-b border-primary pb-1{{ end }}" href="{{ "/schedule/" | relURL }}">SCHEDULE</a>
      <a class="text-[#F5F5F5] hover:text-primary text-[11px] font-bold uppercase tracking-[0.2em] transition-colors{{ if eq $currentPage.RelPermalink "/roster/" }} text-primary border-b border-primary pb-1{{ end }}" href="{{ "/roster/" | relURL }}">ROSTER</a>
      <a class="text-[#F5F5F5] hover:text-primary text-[11px] font-bold uppercase tracking-[0.2em] transition-colors{{ if eq $currentPage.RelPermalink "/memberships/" }} text-primary border-b border-primary pb-1{{ end }}" href="{{ "/memberships/" | relURL }}">MEMBERSHIPS</a>
    </nav>
    <a href="{{ "/memberships/" | relURL }}" class="h-12 px-8 bg-primary text-[#050505] text-[11px] font-heading font-bold tracking-[0.2em] uppercase hover:bg-white hover:scale-105 active:scale-95 transition-all flex items-center justify-center no-underline">
      JOIN THE CULT
    </a>
  </div>
  {{/* Mobile Menu Button */}}
  <div class="md:hidden flex items-center">
    <button data-mobile-menu-toggle class="text-[#F5F5F5] hover:text-primary p-2">
      <span class="material-symbols-outlined text-3xl">menu</span>
    </button>
  </div>
</header>

{{/* Mobile Menu Overlay */}}
<div data-mobile-menu class="hidden fixed inset-0 z-[60] bg-[#0A0A0A]/95 backdrop-blur-lg flex flex-col items-center justify-center gap-8 md:hidden">
  <button data-mobile-menu-toggle class="absolute top-6 right-6 text-[#F5F5F5] hover:text-primary">
    <span class="material-symbols-outlined text-4xl">close</span>
  </button>
  <a class="text-[#F5F5F5] hover:text-primary text-2xl font-heading font-bold uppercase tracking-widest transition-colors" href="{{ "/" | relURL }}">HOME</a>
  <a class="text-[#F5F5F5] hover:text-primary text-2xl font-heading font-bold uppercase tracking-widest transition-colors" href="{{ "/schedule/" | relURL }}">SCHEDULE</a>
  <a class="text-[#F5F5F5] hover:text-primary text-2xl font-heading font-bold uppercase tracking-widest transition-colors" href="{{ "/roster/" | relURL }}">ROSTER</a>
  <a class="text-[#F5F5F5] hover:text-primary text-2xl font-heading font-bold uppercase tracking-widest transition-colors" href="{{ "/memberships/" | relURL }}">MEMBERSHIPS</a>
  <a href="{{ "/memberships/" | relURL }}" class="mt-4 px-12 py-4 bg-primary text-background-dark font-heading font-bold text-xl uppercase tracking-widest no-underline">JOIN THE CULT</a>
</div>

{{/* Default list page layout — fallback */}}
{{ define "main" }}
{{ partial "header.html" . }}
<div class="min-h-screen bg-background-dark pt-32 pb-20 px-6 md:px-12">
  <div class="max-w-7xl mx-auto">
    <h1 class="font-heading text-5xl md:text-7xl font-extrabold uppercase text-[#F5F5F5] mb-16">{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <article class="mb-12 hud-border p-8 bg-surface/50">
      <h2 class="font-heading text-3xl font-bold uppercase text-[#F5F5F5] mb-4">
        <a href="{{ .Permalink }}" class="hover:text-primary transition-colors no-underline text-[#F5F5F5]">{{ .Title }}</a>
      </h2>
      <p class="text-muted">{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
</div>
{{ partial "footer.html" . }}
{{ end }}

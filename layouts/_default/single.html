{{/* Default single page layout */}}
{{ define "main" }}
{{ partial "header.html" . }}
<div class="min-h-screen bg-background-dark pt-32 pb-20 px-6 md:px-12">
  <div class="max-w-4xl mx-auto">
    <h1 class="font-heading text-5xl md:text-7xl font-extrabold uppercase text-[#F5F5F5] mb-8">{{ .Title }}</h1>
    <div class="prose prose-invert prose-lg max-w-none">
      {{ .Content }}
    </div>
  </div>
</div>
{{ partial "footer.html" . }}
{{ end }}
